name: Actualizar Ranking España CS2

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # ← importante para evitar conflictos

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar dependencias
        run: pip install requests pandas
      
      - name: Ejecutar script
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: python ranking_espana_cs2.py
      
      - name: Pull latest changes (evita conflicto)
        run: git pull --rebase
      
      - name: Commit y push cambios
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add ranking_espana_cs2.json ranking_espana_cs2.csv
          git commit -m "Actualización diaria del ranking España - $(date)" || echo "No changes to commit"
          git push
